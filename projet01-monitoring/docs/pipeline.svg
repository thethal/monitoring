<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430" font-family="Arial, sans-serif">
  <rect width="1400" height="430" fill="#ffffff"/>
  <text x="700" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2d3d">Chaîne de traitement de l'observabilité — les 6 étapes</text>
  <text x="700" y="66" font-size="14" text-anchor="middle" fill="#5a6b7b">Application au projet : du capteur (Node Exporter / app) jusqu'à la notification (Slack / e-mail)</text>

  <defs>
    <marker id="a2" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#46586b"/>
    </marker>
  </defs>

  <!-- 6 étapes -->
  <!-- 1 Collecte -->
  <rect x="40" y="120" width="195" height="150" rx="10" fill="#eaf1fb" stroke="#2f6db5" stroke-width="2"/>
  <circle cx="70" cy="150" r="16" fill="#2f6db5"/>
  <text x="70" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
  <text x="138" y="155" font-size="15.5" font-weight="bold" text-anchor="middle" fill="#1f4e79">COLLECTE</text>
  <text x="138" y="186" font-size="11.5" text-anchor="middle" fill="#46586b">Node Exporter</text>
  <text x="138" y="206" font-size="11.5" text-anchor="middle" fill="#46586b">boutique-api /metrics</text>
  <text x="138" y="226" font-size="11.5" text-anchor="middle" fill="#46586b">postgres_exporter</text>
  <text x="138" y="252" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">métriques système + appli</text>

  <!-- 2 Transport -->
  <rect x="262" y="120" width="195" height="150" rx="10" fill="#e7f6f3" stroke="#1a998c" stroke-width="2"/>
  <circle cx="292" cy="150" r="16" fill="#1a998c"/>
  <text x="292" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
  <text x="360" y="155" font-size="15.5" font-weight="bold" text-anchor="middle" fill="#127068">TRANSPORT</text>
  <text x="360" y="190" font-size="11.5" text-anchor="middle" fill="#46586b">HTTP pull (réseau</text>
  <text x="360" y="208" font-size="11.5" text-anchor="middle" fill="#46586b">privé 192.168.56.0/24)</text>
  <text x="360" y="240" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">TLS/mTLS en production</text>

  <!-- 3 Stockage -->
  <rect x="484" y="120" width="195" height="150" rx="10" fill="#fdf3e3" stroke="#e8862e" stroke-width="2"/>
  <circle cx="514" cy="150" r="16" fill="#e8862e"/>
  <text x="514" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
  <text x="582" y="155" font-size="15.5" font-weight="bold" text-anchor="middle" fill="#a85d12">STOCKAGE</text>
  <text x="582" y="190" font-size="11.5" text-anchor="middle" fill="#46586b">Prometheus TSDB</text>
  <text x="582" y="210" font-size="11.5" text-anchor="middle" fill="#46586b">rétention 30 jours</text>
  <text x="582" y="240" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">base temporelle</text>

  <!-- 4 Traitement -->
  <rect x="706" y="120" width="195" height="150" rx="10" fill="#f3eafa" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="736" cy="150" r="16" fill="#8e44ad"/>
  <text x="736" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
  <text x="804" y="155" font-size="15.5" font-weight="bold" text-anchor="middle" fill="#6c3483">TRAITEMENT</text>
  <text x="804" y="190" font-size="11.5" text-anchor="middle" fill="#46586b">Règles PromQL</text>
  <text x="804" y="210" font-size="11.5" text-anchor="middle" fill="#46586b">alert.rules.yml</text>
  <text x="804" y="240" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">évaluation des seuils</text>

  <!-- 5 Visualisation -->
  <rect x="928" y="120" width="195" height="150" rx="10" fill="#eaf6ea" stroke="#3c8c40" stroke-width="2"/>
  <circle cx="958" cy="150" r="16" fill="#3c8c40"/>
  <text x="958" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">5</text>
  <text x="1026" y="155" font-size="14.5" font-weight="bold" text-anchor="middle" fill="#2e6b32">VISUALISATION</text>
  <text x="1026" y="190" font-size="11.5" text-anchor="middle" fill="#46586b">Grafana</text>
  <text x="1026" y="210" font-size="11.5" text-anchor="middle" fill="#46586b">USE + Golden Signals</text>
  <text x="1026" y="240" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">dashboards + variables</text>

  <!-- 6 Notification -->
  <rect x="1150" y="120" width="210" height="150" rx="10" fill="#fdeaea" stroke="#d9534f" stroke-width="2"/>
  <circle cx="1180" cy="150" r="16" fill="#d9534f"/>
  <text x="1180" y="156" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">6</text>
  <text x="1258" y="155" font-size="14.5" font-weight="bold" text-anchor="middle" fill="#a33">NOTIFICATION</text>
  <text x="1255" y="190" font-size="11.5" text-anchor="middle" fill="#46586b">AlertManager + Grafana</text>
  <text x="1255" y="210" font-size="11.5" text-anchor="middle" fill="#46586b">Slack · E-mail</text>
  <text x="1255" y="240" font-size="10.5" font-style="italic" text-anchor="middle" fill="#7a8a99">escalade par sévérité</text>

  <!-- Flèches entre étapes -->
  <path d="M235,195 L260,195" stroke="#46586b" stroke-width="2.2" marker-end="url(#a2)"/>
  <path d="M457,195 L482,195" stroke="#46586b" stroke-width="2.2" marker-end="url(#a2)"/>
  <path d="M679,195 L704,195" stroke="#46586b" stroke-width="2.2" marker-end="url(#a2)"/>
  <path d="M901,195 L926,195" stroke="#46586b" stroke-width="2.2" marker-end="url(#a2)"/>
  <path d="M1123,195 L1148,195" stroke="#46586b" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- bandeau bas -->
  <rect x="40" y="320" width="1320" height="70" rx="10" fill="#f4f7fb" stroke="#b9c7d6" stroke-width="1.5"/>
  <text x="60" y="350" font-size="13.5" font-weight="bold" fill="#2e4960">Les 3 piliers de l'observabilité couverts par le projet :</text>
  <text x="60" y="375" font-size="13" fill="#46586b">Métriques (Prometheus + Node Exporter) — Logs (extensible via ELK/Loki) — Traces (extensible via Tempo/Jaeger). Le projet se concentre sur le pilier « Métriques ».</text>
</svg>
