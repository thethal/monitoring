<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940" font-family="Arial, sans-serif">
  <rect width="1400" height="940" fill="#ffffff"/>

  <!-- Titre -->
  <text x="700" y="42" font-size="28" font-weight="bold" text-anchor="middle" fill="#1f2d3d">Architecture de la solution de monitoring — E-Service Linux</text>
  <text x="700" y="70" font-size="16" text-anchor="middle" fill="#5a6b7b">Hyperviseur VirtualBox sur hôte Windows — 3 VM Debian 13 — Réseau privé hôte 192.168.56.0/24</text>

  <!-- ============ Hôte Windows (cadre extérieur) ============ -->
  <rect x="30" y="92" width="1340" height="810" rx="14" fill="#f4f7fb" stroke="#b9c7d6" stroke-width="2"/>
  <text x="52" y="118" font-size="15" font-weight="bold" fill="#2e4960">PC Hôte — Windows 11 (16 Go RAM, dont 12 Go alloués aux VM, 100 Go disque)</text>

  <!-- Navigateur de l'hôte -->
  <rect x="52" y="135" width="250" height="70" rx="10" fill="#ffffff" stroke="#7f8fa0" stroke-width="1.5"/>
  <text x="177" y="165" font-size="14" font-weight="bold" text-anchor="middle" fill="#2e4960">Navigateur (hôte)</text>
  <text x="177" y="187" font-size="12" text-anchor="middle" fill="#5a6b7b">accès Grafana :3000</text>

  <!-- ============ VM1 : srv-monitor ============ -->
  <rect x="60" y="240" width="520" height="620" rx="12" fill="#ffffff" stroke="#2f6db5" stroke-width="2.5"/>
  <rect x="60" y="240" width="520" height="46" rx="12" fill="#2f6db5"/>
  <text x="320" y="270" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">VM1 — srv-monitor</text>
  <text x="320" y="306" font-size="13" text-anchor="middle" fill="#5a6b7b">192.168.56.10 — 2 vCPU — 4096 Mo — 40 Go</text>

  <!-- Composants VM1 -->
  <rect x="90" y="330" width="200" height="78" rx="9" fill="#fdecea" stroke="#d9534f" stroke-width="1.8"/>
  <text x="190" y="358" font-size="15" font-weight="bold" text-anchor="middle" fill="#a33">Prometheus</text>
  <text x="190" y="378" font-size="11.5" text-anchor="middle" fill="#5a6b7b">collecte + règles</text>
  <text x="190" y="395" font-size="11.5" text-anchor="middle" fill="#5a6b7b">TSDB :9090</text>

  <rect x="350" y="330" width="200" height="78" rx="9" fill="#fff4e5" stroke="#e8862e" stroke-width="1.8"/>
  <text x="450" y="358" font-size="15" font-weight="bold" text-anchor="middle" fill="#b5650f">AlertManager</text>
  <text x="450" y="378" font-size="11.5" text-anchor="middle" fill="#5a6b7b">routage alertes</text>
  <text x="450" y="395" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:9093</text>

  <rect x="90" y="430" width="200" height="78" rx="9" fill="#eaf3ea" stroke="#3c8c40" stroke-width="1.8"/>
  <text x="190" y="458" font-size="15" font-weight="bold" text-anchor="middle" fill="#2e6b32">Grafana</text>
  <text x="190" y="478" font-size="11.5" text-anchor="middle" fill="#5a6b7b">dashboards + alertes</text>
  <text x="190" y="495" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:3000</text>

  <rect x="350" y="430" width="200" height="78" rx="9" fill="#eef0f4" stroke="#7f8fa0" stroke-width="1.8"/>
  <text x="450" y="458" font-size="14" font-weight="bold" text-anchor="middle" fill="#46586b">Node Exporter</text>
  <text x="450" y="478" font-size="11.5" text-anchor="middle" fill="#5a6b7b">métriques système</text>
  <text x="450" y="495" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:9100</text>

  <!-- Dashboards rappel -->
  <rect x="90" y="540" width="460" height="120" rx="9" fill="#f7f9fc" stroke="#b9c7d6" stroke-width="1.5"/>
  <text x="320" y="565" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#2e4960">Dashboards Grafana provisionnés (as-code)</text>
  <rect x="110" y="580" width="200" height="60" rx="7" fill="#ffffff" stroke="#2f6db5" stroke-width="1.3"/>
  <text x="210" y="606" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#2f6db5">Dashboard USE</text>
  <text x="210" y="625" font-size="10.5" text-anchor="middle" fill="#5a6b7b">CPU / RAM / Disque / Réseau</text>
  <rect x="330" y="580" width="200" height="60" rx="7" fill="#ffffff" stroke="#3c8c40" stroke-width="1.3"/>
  <text x="430" y="606" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#2e6b32">Golden Signals</text>
  <text x="430" y="625" font-size="10.5" text-anchor="middle" fill="#5a6b7b">Latence / Trafic / Erreurs</text>

  <!-- Notifications -->
  <rect x="90" y="685" width="460" height="150" rx="9" fill="#fbf5ff" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="320" y="710" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#7d3c98">Notifications sortantes</text>
  <rect x="120" y="728" width="180" height="48" rx="7" fill="#ffffff" stroke="#7d3c98" stroke-width="1.2"/>
  <text x="210" y="757" font-size="13" font-weight="bold" text-anchor="middle" fill="#7d3c98">Slack</text>
  <rect x="340" y="728" width="180" height="48" rx="7" fill="#ffffff" stroke="#7d3c98" stroke-width="1.2"/>
  <text x="430" y="757" font-size="13" font-weight="bold" text-anchor="middle" fill="#7d3c98">E-mail (SMTP)</text>
  <text x="320" y="808" font-size="11" text-anchor="middle" fill="#5a6b7b">#monitoring (warning) · #incidents + e-mail (critical)</text>

  <!-- ============ VM2 : srv-web01 ============ -->
  <rect x="610" y="240" width="360" height="300" rx="12" fill="#ffffff" stroke="#e8862e" stroke-width="2.5"/>
  <rect x="610" y="240" width="360" height="46" rx="12" fill="#e8862e"/>
  <text x="790" y="270" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">VM2 — srv-web01</text>
  <text x="790" y="306" font-size="13" text-anchor="middle" fill="#5a6b7b">192.168.56.11 — 2 vCPU — 3072 Mo — 25 Go</text>

  <rect x="640" y="330" width="300" height="80" rx="9" fill="#fff4e5" stroke="#e8862e" stroke-width="1.8"/>
  <text x="790" y="360" font-size="15" font-weight="bold" text-anchor="middle" fill="#b5650f">boutique-api (Flask)</text>
  <text x="790" y="382" font-size="11.5" text-anchor="middle" fill="#5a6b7b">app instrumentée — RED / Golden Signals</text>
  <text x="790" y="399" font-size="11.5" text-anchor="middle" fill="#5a6b7b">/metrics :8000</text>

  <rect x="640" y="430" width="300" height="78" rx="9" fill="#eef0f4" stroke="#7f8fa0" stroke-width="1.8"/>
  <text x="790" y="458" font-size="14" font-weight="bold" text-anchor="middle" fill="#46586b">Node Exporter</text>
  <text x="790" y="478" font-size="11.5" text-anchor="middle" fill="#5a6b7b">métriques système</text>
  <text x="790" y="495" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:9100</text>

  <!-- ============ VM3 : srv-db01 ============ -->
  <rect x="1000" y="240" width="340" height="300" rx="12" fill="#ffffff" stroke="#3c8c40" stroke-width="2.5"/>
  <rect x="1000" y="240" width="340" height="46" rx="12" fill="#3c8c40"/>
  <text x="1170" y="270" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">VM3 — srv-db01</text>
  <text x="1170" y="306" font-size="13" text-anchor="middle" fill="#5a6b7b">192.168.56.12 — 2 vCPU — 3072 Mo — 25 Go</text>

  <rect x="1030" y="330" width="280" height="80" rx="9" fill="#eaf3ea" stroke="#3c8c40" stroke-width="1.8"/>
  <text x="1170" y="360" font-size="15" font-weight="bold" text-anchor="middle" fill="#2e6b32">PostgreSQL</text>
  <text x="1170" y="382" font-size="11.5" text-anchor="middle" fill="#5a6b7b">+ postgres_exporter</text>
  <text x="1170" y="399" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:9187</text>

  <rect x="1030" y="430" width="280" height="78" rx="9" fill="#eef0f4" stroke="#7f8fa0" stroke-width="1.8"/>
  <text x="1170" y="458" font-size="14" font-weight="bold" text-anchor="middle" fill="#46586b">Node Exporter</text>
  <text x="1170" y="478" font-size="11.5" text-anchor="middle" fill="#5a6b7b">métriques système</text>
  <text x="1170" y="495" font-size="11.5" text-anchor="middle" fill="#5a6b7b">:9100</text>

  <!-- ============ Flux de données (flèches) ============ -->
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 z" fill="#2f6db5"/>
    </marker>
    <marker id="arrowP" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 z" fill="#9b59b6"/>
    </marker>
  </defs>

  <!-- scrape : deux flèches représentatives VM2/VM3 -> Prometheus, routées au-dessus des boîtes -->
  <path d="M790,330 L790,314 L192,314 L192,330" fill="none" stroke="#2f6db5" stroke-width="2.4" stroke-dasharray="7,4" marker-end="url(#arrow)"/>
  <path d="M1170,330 L1170,306 L188,306 L188,330" fill="none" stroke="#2f6db5" stroke-width="2.4" stroke-dasharray="7,4" marker-end="url(#arrow)"/>
  <text x="600" y="300" font-size="12.5" font-weight="bold" fill="#2f6db5">scrape /metrics (pull) toutes les 15 s — :9100 · :8000 · :9187</text>

  <!-- node exporter VM1 -> prometheus (interne) -->
  <path d="M350,449 L320,449 L320,398 L292,398" fill="none" stroke="#2f6db5" stroke-width="2.2" stroke-dasharray="7,4" marker-end="url(#arrow)"/>

  <!-- prometheus -> grafana (datasource PromQL) -->
  <path d="M150,408 L150,430" fill="none" stroke="#3c8c40" stroke-width="2.6" marker-end="url(#arrow)"/>
  <!-- prometheus -> alertmanager -->
  <path d="M290,360 L350,360" fill="none" stroke="#d9534f" stroke-width="2.6" marker-end="url(#arrow)"/>
  <!-- alertmanager -> notifications -->
  <path d="M450,408 L450,540 L430,540 L430,685" fill="none" stroke="#9b59b6" stroke-width="2.6" marker-end="url(#arrowP)"/>
  <!-- grafana alerting -> notifications -->
  <path d="M210,508 L210,685" fill="none" stroke="#9b59b6" stroke-width="2.6" marker-end="url(#arrowP)"/>
  <!-- navigateur hote -> grafana -->
  <path d="M177,205 L177,420 L185,420 L185,430" fill="none" stroke="#3c8c40" stroke-width="2.2" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Légende -->
  <rect x="610" y="580" width="730" height="280" rx="10" fill="#ffffff" stroke="#b9c7d6" stroke-width="1.5"/>
  <text x="630" y="608" font-size="15" font-weight="bold" fill="#2e4960">Légende des flux</text>

  <line x1="640" y1="635" x2="690" y2="635" stroke="#2f6db5" stroke-width="2.2" stroke-dasharray="6,4"/>
  <text x="700" y="640" font-size="13" fill="#46586b">Collecte des métriques (Prometheus interroge les cibles en mode pull)</text>

  <line x1="640" y1="668" x2="690" y2="668" stroke="#3c8c40" stroke-width="2.4"/>
  <text x="700" y="673" font-size="13" fill="#46586b">Requêtes PromQL (Grafana lit les données dans Prometheus)</text>

  <line x1="640" y1="701" x2="690" y2="701" stroke="#d9534f" stroke-width="2.4"/>
  <text x="700" y="706" font-size="13" fill="#46586b">Transmission des alertes détectées (Prometheus vers AlertManager)</text>

  <line x1="640" y1="734" x2="690" y2="734" stroke="#9b59b6" stroke-width="2.4"/>
  <text x="700" y="739" font-size="13" fill="#46586b">Notifications sortantes (Slack, e-mail)</text>

  <text x="630" y="778" font-size="12.5" font-weight="bold" fill="#2e4960">Budget ressources :</text>
  <text x="630" y="800" font-size="12.5" fill="#46586b">RAM VM : 4096 + 3072 + 3072 = 10 240 Mo &lt; 12 Go alloués (2 Go de marge)</text>
  <text x="630" y="822" font-size="12.5" fill="#46586b">Disque : 40 + 25 + 25 = 90 Go &lt; 100 Go disponibles</text>
  <text x="630" y="844" font-size="12.5" fill="#46586b">Node Exporter présent sur les 3 nœuds (conforme au cahier des charges)</text>
</svg>
